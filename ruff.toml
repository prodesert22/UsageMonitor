target-version = "py310"
line-length = 140

exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    ".ruff_cache",
]

[lint]
# Default ruff rules: E4,E7,E9,F,I,N,UP,W + extend-select for project
extend-select = [
    "B",   # flake8-bugbear (catches logic bugs)
    "C4",  # flake8-comprehensions
    "RUF", # ruff-specific rules
]
ignore = [
    "B904",  # raise-without-from-inside-except — too noisy for this project
]
